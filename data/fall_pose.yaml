# YOLOv8 人体姿态估计数据集配置
# 用于训练/微调 YOLOv8n-pose 姿态估计器

# 数据集根目录
path: ./datasets/fall_pose

# 训练/验证/测试图像路径
train: images/train
val: images/val
test: images/test  # 可选

# 关键点配置 (COCO格式 - 17个关键点)
kpt_shape: [17, 3]  # [关键点数量, 每个点维度(x,y,visible)]

# 左右翻转对应索引 (用于数据增强)
# COCO关键点顺序: 鼻子, 左眼, 右眼, 左耳, 右耳, 左肩, 右肩, 左肘, 右肘, 左手腕, 右手腕, 左髋, 右髋, 左膝, 右膝, 左踝, 右踝
flip_idx: [0, 2, 1, 4, 3, 6, 5, 8, 7, 10, 9, 12, 11, 14, 13, 16, 15]

# 关键点名称 (用于可视化)
kpt_names:
  0: nose
  1: left_eye
  2: right_eye
  3: left_ear
  4: right_ear
  5: left_shoulder
  6: right_shoulder
  7: left_elbow
  8: right_elbow
  9: left_wrist
  10: right_wrist
  11: left_hip
  12: right_hip
  13: left_knee
  14: right_knee
  15: left_ankle
  16: right_ankle

# 类别定义
names:
  0: person

# 可选: 类别数量
nc: 1

# 关键点对称性 (用于评估)
skeleton:  # [起点, 终点] 关键点连接关系 (用于可视化)
  - [15, 13]  # left_ankle -> left_knee
  - [13, 11]  # left_knee -> left_hip
  - [16, 14]  # right_ankle -> right_knee
  - [14, 12]  # right_knee -> right_hip
  - [11, 12]  # left_hip -> right_hip
  - [5, 11]   # left_shoulder -> left_hip
  - [6, 12]   # right_shoulder -> right_hip
  - [5, 6]    # left_shoulder -> right_shoulder
  - [5, 7]    # left_shoulder -> left_elbow
  - [6, 8]    # right_shoulder -> right_elbow
  - [7, 9]    # left_elbow -> left_wrist
  - [8, 10]   # right_elbow -> right_wrist
  - [1, 2]    # left_eye -> right_eye
  - [0, 1]    # nose -> left_eye
  - [0, 2]    # nose -> right_eye
  - [1, 3]    # left_eye -> left_ear
  - [2, 4]    # right_eye -> right_ear
  - [3, 5]    # left_ear -> left_shoulder
  - [4, 6]    # right_ear -> right_shoulder

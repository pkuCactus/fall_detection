# YOLO-World 人体姿态检测数据集配置
# 用于开放词汇检测训练

path: data/mini  # 数据集根目录

# 使用标准 YOLO 目录结构
train: images/train
val: images/val

# 类别定义 (8种姿态类别)
names:
  0: person standing
  1: person sitting
  2: person squatting
  3: person bending
  4: person half up or crouching
  5: person kneeling
  6: person crawling or crawling-like
  7: person lying on floor

nc: 8

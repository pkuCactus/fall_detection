detector:
  conf_thresh: 0.3
  model_path: "runs/detect/yolov8n/person_detector/weights/best.pt"  # 检测器模型路径，null则使用默认yolov8n.pt
  classes: null      # 开放词汇检测器文本提示，如 ["person"]

pose_estimator:
  model_path: "data/models/pretrained/yolov8n-pose.pt"  # 姿态估计器模型路径，null则使用默认yolov8n-pose.pt

classifier:
  type: "simple"                                  # 分类器类型: "fusion" (3分支) 或 "simple" (仅图像)
  model_path: "runs/simple_classifier/best.pt" # 模型路径, null则使用默认路径
  fall_class_idx: 1                               # 跌倒类别索引（0或1），simple分类器使用

tracker:
  track_thresh: 0.5
  match_thresh: 0.8
  max_age: 30
  min_hits: 3

rules:
  h_ratio_thresh: 0.60        # 坐姿/弯腰约0.5，跌倒通常更低
  n_ground_min: 2             # 2个点贴地才触发，减少单点误检
  motion_window_seconds: 0.5   # 运动检测窗口（秒）
  trigger_thresh: 0.60        # 3条规则触发即可运行分类器（5*0.6=3）
  motion_thresh: 50.0         # px/s：运动期位移阈值（2px/frame @ 25fps）
  static_thresh: 20.0         # px/s：静止期位移阈值（0.8px/frame @ 25fps）
  fall_vy_thresh: 200.0       # px/s：垂直下降速度阈值（8px/frame @ 25fps）
  accel_thresh: 100.0         # px/s^2：加速度辅助阈值
  visible_ratio_min: 0.50     # 关键点可见比例下限（放宽）
  ground_ratio: 0.40          # 贴地判定：bbox底部40%区域算贴地
  fps: 25                     # 规则引擎归一化帧率

fusion:
  alpha: 0.5      # 降低规则权重，避免纯规则主导
  beta: 0.3       # 启用分类器过滤（模型已存在）
  gamma: 0.2      # 保持时序平滑权重
  alarm_thresh: 0.50  # 提高告警阈值，减少日常动作误报
  alarm_min_frames: 3
  sequence_check_frames: 8    # 姿态转换序列检查窗口（帧）
  reset_seconds: 0.5       # 0.5秒无检测后进入恢复期（快速恢复）
  cooldown_seconds: 3.0    # 3秒冷却期，防止频繁上报
  recovery_seconds: 0.5    # 0.5秒恢复确认期，快速恢复正常

keypoint_tracker:
  enabled: false              # 禁用关键点跟踪器，避免跳帧时关键点闪烁
  smooth_alpha: 0.7           # 平滑系数（当前值权重）
  velocity_decay: 0.9         # 速度衰减
  max_history: 5              # 最大历史帧数
  use_optical_flow: false     # 是否使用光流

pipeline:
  skip_frames: 2
  fps: 25

training:
  detector:
    data_yaml: "data/fall_detection.yaml"
    epochs: 50
    imgsz: 832
    batch: 16
    output_dir: "train/detector"
  pose:
    data_yaml: "data/fall_pose.yaml"
    epochs: 100
    imgsz: 128
    batch: 64
    output_dir: "train/pose"
  classifier:
    feature_cache: "train/cache"
    epochs: 100
    batch_size: 32
    lr: 0.001
    output_dir: "train/classifier"
  tracker:
    video_dir: "data/videos"
    gt_dir: "data/tracker_gt"
    output_dir: "train/tracker"
  pipeline:
    val_video_dir: "data/videos"
    val_gt_dir: "data/event_gt"
    output_dir: "train/eval"

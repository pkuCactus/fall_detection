detector:
  conf_thresh: 0.3

classifier:
  model_path: "train/classifier/best.pt"  # 分类器模型路径

tracker:
  track_thresh: 0.5
  match_thresh: 0.8
  max_age: 30
  min_hits: 3

rules:
  h_ratio_thresh: 0.60        # 放宽：坐着时约0.6，跌倒时<0.6
  n_ground_min: 2             # 放宽：2个点贴地即可
  motion_window_seconds: 1.0
  trigger_thresh: 0.25        # 降低：只要1个规则触发就运行分类器
  motion_thresh: 10.0         # 运动期平均位移阈值（像素/帧）
  static_thresh: 5.0          # 静止期平均位移阈值（像素/帧）
  fall_vy_thresh: 20          # 降低：垂直下降速度阈值（像素/帧）

fusion:
  alpha: 0.70
  beta: 0.20
  gamma: 0.10
  alarm_thresh: 0.50
  alarm_min_frames: 2
  reset_seconds: 1.0       # 1秒无检测后进入恢复期
  cooldown_seconds: 3.0    # 3秒冷却期，防止频繁上报
  recovery_seconds: 1.0    # 1秒恢复确认期，防止状态抖动

pipeline:
  skip_frames: 2
  fps: 25

training:
  detector:
    data_yaml: "data/fall_detection.yaml"
    epochs: 50
    imgsz: 832
    batch: 16
    output_dir: "train/detector"
  pose:
    data_yaml: "data/fall_pose.yaml"
    epochs: 100
    imgsz: 128
    batch: 64
    output_dir: "train/pose"
  classifier:
    feature_cache: "train/cache"
    epochs: 100
    batch_size: 32
    lr: 0.001
    output_dir: "train/classifier"
  tracker:
    video_dir: "data/videos"
    gt_dir: "data/tracker_gt"
    output_dir: "train/tracker"
  pipeline:
    val_video_dir: "data/videos"
    val_gt_dir: "data/event_gt"
    output_dir: "train/eval"

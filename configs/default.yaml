detector:
  conf_thresh: 0.3

tracker:
  track_thresh: 0.5
  match_thresh: 0.8
  max_age: 30
  min_hits: 3

rules:
  h_ratio_thresh: 0.55        # 降低：要求更低的高度比（更严格，排除坐着）
  n_ground_min: 3             # 增加：要求更多点贴地
  motion_window_seconds: 1.0
  trigger_thresh: 0.40        # 提高：需要至少2个规则（4*0.4=1.6）
  motion_thresh: 0.5          # 降低：更容易触发规则C
  static_thresh: 0.8          # 提高：静止判定更宽松
  fall_vy_thresh: 30          # 规则D：垂直下降速度阈值（像素/帧）

fusion:
  alpha: 0.50
  beta: 0.30
  gamma: 0.20
  alarm_thresh: 0.55
  alarm_min_frames: 2
  reset_seconds: 1.0       # 1秒无检测后进入恢复期
  cooldown_seconds: 3.0    # 3秒冷却期，防止频繁上报
  recovery_seconds: 1.0    # 1秒恢复确认期，防止状态抖动

pipeline:
  skip_frames: 2
  fps: 25

training:
  detector:
    data_yaml: "data/fall_detection.yaml"
    epochs: 50
    imgsz: 832
    batch: 16
    output_dir: "train/detector"
  pose:
    data_yaml: "data/fall_pose.yaml"
    epochs: 100
    imgsz: 128
    batch: 64
    output_dir: "train/pose"
  classifier:
    feature_cache: "train/cache"
    epochs: 100
    batch_size: 32
    lr: 0.001
    output_dir: "train/classifier"
  tracker:
    video_dir: "data/videos"
    gt_dir: "data/tracker_gt"
    output_dir: "train/tracker"
  pipeline:
    val_video_dir: "data/videos"
    val_gt_dir: "data/event_gt"
    output_dir: "train/eval"

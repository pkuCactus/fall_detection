detector:
  conf_thresh: 0.3

tracker:
  track_thresh: 0.5
  match_thresh: 0.8
  max_age: 30
  min_hits: 3

rules:
  h_ratio_thresh: 0.6
  n_ground_min: 2
  motion_window_seconds: 1.5
  trigger_thresh: 0.4

fusion:
  alpha: 0.35
  beta: 0.45
  gamma: 0.20
  alarm_thresh: 0.60
  alarm_min_frames: 3
  reset_seconds: 3.0

pipeline:
  skip_frames: 2
  fps: 25

training:
  detector:
    data_yaml: "data/fall_detection.yaml"
    epochs: 50
    imgsz: 832
    batch: 16
    output_dir: "train/detector"
  pose:
    data_yaml: "data/fall_pose.yaml"
    epochs: 100
    imgsz: 128
    batch: 64
    output_dir: "train/pose"
  classifier:
    feature_cache: "train/cache"
    epochs: 100
    batch_size: 32
    lr: 0.001
    output_dir: "train/classifier"
  tracker:
    video_dir: "data/videos"
    gt_dir: "data/tracker_gt"
    output_dir: "train/tracker"
  pipeline:
    val_video_dir: "data/videos"
    val_gt_dir: "data/event_gt"
    output_dir: "train/eval"

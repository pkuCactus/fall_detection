# 简单图像分类器训练配置 - Pascal VOC 格式
# 支持多目录、多类别映射
# 使用: bash scripts/shell/run_train_simple_classifier.sh --config configs/training/simple_classifier_voc.yaml

# 随机种子 (可选) - 设置后训练结果可复现
seed: 666

# 数据配置 - Pascal VOC 格式
data:
  format: "voc"  # 使用 Pascal VOC 格式

  # 旧版单目录配置 (已废弃，请使用 voc.train_dirs)
  # image_dir: "data/VOC/JPEGImages"

# Pascal VOC 专用配置
voc:
  # === 数据目录配置 ===
  # 支持单个目录或多个目录列表
  # 每个目录结构应为:
  #   data_dir/
  #   ├── JPEGImages/      # 图像
  #   ├── Annotations/     # XML标注
  #   └── ImageSets/
  #       └── Main/
  #           ├── train.txt
  #           ├── val.txt
  #           └── test.txt

  # 训练数据目录 (可指定多个)
  train_dirs:
    - "data/mini"

  # 验证数据目录 (可选，不指定则不使用验证集)
  val_dirs:
    - "data/mini"
  # 也可以单独指定不同的验证目录:
  # val_dirs:
  #   - "data/val_set"

  # === 类别映射配置 ===
  # 跌倒类别: 这些类别名称映射到 label=1
  fall_classes:
    - "fall_down"
    - "kneel"
    - "half_up"
    - "crawl"

  # 非跌倒类别: 这些类别名称映射到 label=0
  # 如果为 null 或未指定，则所有非 fall_classes 都视为正常
  normal_classes:
    - "stand"
    - "sit"
    - "squat"
    - "bend"
  # 如果只想识别特定类别为正常，其他跳过，可以这样配置:
  # normal_classes: ["person", "standing"]
  # 如果想让所有其他类别都作为正常样本:
  # normal_classes: null

# 模型配置
model:
  type: "simple"
  dropout: 0.1
  num_classes: 2

# 训练配置
epochs: 100
batch_size: 256  # 全局batch size（所有GPU的总和）
num_workers: 4  # 数据加载worker数量（建议: CPU核心数/每卡，或4-8）
prefetch_factor: 2  # 每个worker预取的batch数量

# 优化器配置
lr: 0.001
weight_decay: 0.0001
label_smooth: 0.1  # label smoothing (0.0 = 禁用, 推荐 0.1)

# 学习率调度
lr_scheduler:
  type: "plateau"
  factor: 0.5
  patience: 10
  min_lr: 0.00001

  # Warmup 配置 (可选)
  warmup:
    enabled: true  # 是否启用 warmup
    epochs: 5       # warmup 持续的 epoch 数
    strategy: "linear"  # warmup 策略: "linear" (线性增加) 或 "constant" (保持不变)
    init_lr: 0.00001    # warmup 初始学习率

# 早停配置
early_stopping:
  enabled: true
  patience: 20
  min_delta: 0.001
  mode: "max"

# 输入配置
input:
  target_size: 96
  use_letterbox: true
  fill_value: 114

# 数据增强
data_augmentation:
  enabled: true
  color_jitter:
    enabled: true
    brightness: 0.3
    contrast: 0.3
    saturation: 0.3
  random_gray:
    enabled: true
    p: 0.2
  random_rotation:
    enabled: true
    angle_range: [-5, 5]
    p: 0.3
  random_mask:
    enabled: true
    mask_ratio: 0.1
    p: 0.3
  horizontal_flip:
    enabled: false
    p: 0.5

# 随机Crop配置
crop:
  shrink_max: 3
  expand_max: 10

# 缓存配置
cache:
  dir: "outputs/cache"  # VOC格式样本列表缓存目录
  image_cache_size: 100  # LRU图像缓存大小（张），设为0禁用缓存

# 输出配置
output:
  dir: "runs/simple_classifier"
  save_best: true
  save_every: 10

# torch.compile 配置 (PyTorch 2.0+)
compile:
  enabled: true  # DDP训练建议禁用torch.compile以避免cudagraphs问题
  mode: "reduce-overhead"  # 编译模式: "default", "reduce-overhead", "max-autotune"
  # 注意: "reduce-overhead"模式在DDP下会导致cudagraphs警告，自动降级为"default"

# DDP配置
ddp:
  backend: "nccl"
  find_unused_parameters: false
  gradient_as_bucket_view: true  # 解决"Grad strides do not match"警告，提升性能

# 日志
log:
  epoch_log_interval: 1  # 每N轮打印epoch日志
  batch_log_interval: 10  # 每N个batch打印batch日志
  verbose: true

# 姿态估计器训练配置 (YOLOv8n-pose)
# 使用: bash scripts/shell/run_train_pose.sh --ngpus 2

# 数据配置
data: "data/fall_pose.yaml"  # YOLO格式姿态数据配置文件

# 模型配置
model: "yolov8n-pose.pt"  # 预训练姿态模型
imgsz: 128  # 输入图像尺寸 (姿态估计通常用较小尺寸)

# 训练配置
epochs: 100
batch: 64
workers: 8

# 优化器配置
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005

# 关键点特定配置
kpt_shape: [17, 3]  # [关键点数量, 每个点维度(x,y,visible)]
flip_idx: [0, 2, 1, 4, 3, 6, 5, 8, 7, 10, 9, 12, 11, 14, 13, 16, 15]  # 左右翻转对应索引

# 数据增强 (姿态任务通常需要更保守的增强)
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 10.0  # 允许适度旋转
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5   # 左右翻转对姿态学习很重要
mosaic: 0.5   # 姿态任务mosaic可以稍低
mixup: 0.0
copy_paste: 0.0

# 损失权重
box: 7.5      # 边界框损失权重
cls: 0.5      # 分类损失权重
dfl: 1.5      # 分布焦点损失权重
pose: 12.0    # 关键点损失权重 (关键！)
kobj: 2.0     # 关键点目标性损失权重

# 输出配置
project: "train/pose"
name: "exp"
exist_ok: false

# 设备配置
device: null

# 早停与保存
patience: 20
save: true
save_period: 10

# 日志
verbose: true

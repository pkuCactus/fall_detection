# 融合分类器 (3分支) 训练配置
# 使用: bash scripts/shell/run_train_classifier.sh --config configs/training/classifier.yaml

# 数据配置
cache_dir: "outputs/cache"  # 特征缓存目录
val_ratio: 0.2  # 验证集比例

# 模型配置
dropout: 0.3  # Dropout率

# 训练配置
epochs: 100
batch_size: 32
num_workers: 0  # 数据加载线程数 (0避免DataLoader问题)

# 优化器配置
lr: 0.001  # 学习率
weight_decay: 0.0001  # 权重衰减

# 学习率调度
lr_scheduler:
  type: "plateau"  # plateau, cosine, step
  factor: 0.5
  patience: 10
  min_lr: 0.00001

# 早停配置
early_stopping:
  enabled: true
  patience: 20
  min_delta: 0.001

# 输出配置
output_dir: "outputs/classifier"  # 训练输出目录

# torch.compile 配置 (PyTorch 2.0+)
compile:
  enabled: true  # 是否启用 torch.compile
  mode: "reduce-overhead"  # 编译模式: "default", "reduce-overhead", "max-autotune"

# DDP配置
ddp:
  backend: "nccl"

# 日志
verbose: true  # 详细输出

# 完整训练流程配置
# 统一入口，按顺序执行各阶段训练

# 阶段1: 检测器训练
detector:
  enabled: true
  config: "configs/training/detector.yaml"
  ngpus: 1

# 阶段1b: YOLOWorld检测器训练 (可选)
yolo_world:
  enabled: false
  config: "configs/training/yolo_world.yaml"
  ngpus: 1

# 阶段2: 姿态估计器训练
pose:
  enabled: true
  config: "configs/training/pose.yaml"
  ngpus: 1

# 阶段3: 跟踪器调优
tracker:
  enabled: true
  config: "configs/training/tracker.yaml"

# 阶段4: 特征提取
feature_extraction:
  enabled: true
  config: "configs/training/feature_extraction.yaml"

# 阶段5: 分类器训练
classifier:
  enabled: true
  config: "configs/training/classifier.yaml"
  ngpus: 1

# 阶段6: 端到端评估
evaluate:
  enabled: true
  config: "configs/training/evaluate.yaml"

# 全局配置
workspace: "train"  # 所有训练输出的根目录
seed: 42  # 随机种子

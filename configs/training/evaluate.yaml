# 端到端评估配置
# 使用: bash scripts/shell/run_evaluate_pipeline.sh

# 输入数据
video_dir: "data/videos"
gt_file: "data/event_gt.json"  # 跌倒事件真值 (时间戳格式)

# Pipeline配置
pipeline_config: "configs/default.yaml"

# 阈值网格搜索 (用于找到最佳F1点)
grid_search:
  enabled: true
  # 规则触发阈值
  trigger_thresh:
    min: 0.5
    max: 0.8
    step: 0.05
  # 告警阈值
  alarm_thresh:
    min: 0.4
    max: 0.7
    step: 0.05

# 评估指标
metrics:
 - precision
 - recall
 - f1_score
 - false_alarm_rate  # 误报率 (每小时误报次数)
 - average_latency   # 平均检测延迟 (秒)

# 事件匹配参数
matching:
  iou_thresh: 0.3  # 跟踪ID匹配阈值
  time_tolerance: 2.0  # 时间容错 (秒)，真值和预测相差在此范围内算匹配

# 输出配置
output_dir: "train/eval"
output_file: "eval_result.json"
visualize: true  # 是否生成可视化结果
viz_dir: "train/eval/visualizations"

# Mock模式 (用于快速测试)
mock_detector: false  # 使用mock检测器 (随机框)

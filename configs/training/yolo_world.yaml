# YOLOWorld人体检测器训练配置
# 使用: bash scripts/shell/run_train_yolo_world.sh --ngpus 2

# 随机种子（可选，用于可复现性）
seed: 666

# 数据配置
data: "data/yaml/fall_detection_yolo_world.yaml"  # YOLO-World格式数据配置文件路径

# 模型配置
model: "data/models/pretrained/yolov8s-worldv2.pt"  # 预训练YOLOWorld v2模型路径

# 训练配置
epochs: 50
imgsz: 960  # 训练时使用正方形尺寸 (YOLO训练只支持整数/正方形)
batch: 64
workers: 8  # 数据加载线程数
project: "yolov8s-worldv2"  # 训练输出目录 (Ultralytics会自动添加runs/detect/前缀)
name: "person_detector"  # 实验名称
exist_ok: true  # 是否覆盖已有实验目录

# 优化器配置
lr0: 0.01  # 初始学习率
lrf: 0.0001  # 最终学习率 (lr0 * lrf)
momentum: 0.937  # SGD动量
weight_decay: 0.0005  # 权重衰减
warmup_epochs: 3.0  # warmup轮数
warmup_momentum: 0.8  # warmup期间的动量
warmup_bias_lr: 0.01  # warmup期间偏置的学习率

# 数据增强
hsv_h: 0.015  # HSV色调增强
hsv_s: 0.7    # HSV饱和度增强
hsv_v: 0.4    # HSV亮度增强
degrees: 0.0  # 旋转角度
translate: 0.1  # 平移
scale: 0.5    # 缩放
shear: 0.0    # 剪切
perspective: 0.0  # 透视变换
flipud: 0.0   # 上下翻转
fliplr: 0.5   # 左右翻转
mosaic: 1.0   # Mosaic增强
mixup: 0.0    # Mixup增强
copy_paste: 1.0  # 复制粘贴增强

# 早停与保存
patience: 10  # 早停耐心值
save: true    # 保存检查点
save_period: 10  # 每N轮保存一次

# 日志
verbose: true  # 详细输出

# 设备配置
device: 0  # 设备 (cuda=自动选择, 0=GPU0, cpu=CPU)

# torch.compile 配置 (PyTorch 2.0+)
compile:
  enabled: true  # 是否启用 torch.compile
  mode: "reduce-overhead"  # 编译模式: "default", "reduce-overhead", "max-autotune"

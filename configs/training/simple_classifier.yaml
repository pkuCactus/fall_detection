# 简单图像分类器训练配置
# 使用: bash scripts/shell/run_train_simple_classifier.sh --config configs/training/simple_classifier.yaml

# 随机种子 (可选) - 设置后训练结果可复现
seed: 666

# 数据配置
# 支持两种格式: COCO (format: coco) 或 Pascal VOC (format: voc)
data:
  format: "coco"  # 数据格式: "coco" 或 "voc"
  image_dir: "data/images"  # 图像根目录

  # === COCO 格式配置 (当 format=coco 时使用) ===
  train_coco_json: "data/annotations/train.json"  # 训练集COCO标注
  val_coco_json: "data/annotations/val.json"  # 验证集COCO标注 (可选，null表示无验证集)

  # === Pascal VOC 格式配置 (当 format=voc 时使用，详见 simple_classifier_voc.yaml) ===
  # voc 配置项在下面的 voc: 段落中设置

# 模型配置
model:
  type: "simple"  # simple: 简单图像分类器
  dropout: 0.3
  num_classes: 2  # 类别数量
  fall_category_id: 1  # 跌倒类别的category_id (COCO格式使用)

# 训练配置
epochs: 100
batch_size: 64  # 全局batch size（所有GPU的总和）
                  # DDP训练时，每个GPU的batch_size = batch_size / num_gpus
num_workers: 8  # 数据加载worker数量，建议根据CPU核心数设置4-16
prefetch_factor: 4  # 每个worker预取的batch数量

# 优化器配置
lr: 0.001
weight_decay: 0.0001
label_smooth: 0.1  # label smoothing (0.0 = 禁用, 推荐 0.1)

# 学习率调度
lr_scheduler:
  type: "plateau"  # plateau, cosine, step
  factor: 0.5
  patience: 10
  min_lr: 0.00001

  # Warmup 配置 (可选)
  warmup:
    enabled: true  # 是否启用 warmup
    epochs: 5       # warmup 持续的 epoch 数
    strategy: "linear"  # warmup 策略: "linear" (线性增加) 或 "constant" (保持不变)
    init_lr: 0.00001    # warmup 初始学习率

# 早停配置
early_stopping:
  enabled: true
  patience: 20
  min_delta: 0.001
  mode: "max"

# 输入配置
input:
  target_size: 96  # 输入尺寸
  use_letterbox: true  # 是否使用letterbox保持长宽比
  fill_value: 114  # letterbox填充值

# 数据增强
data_augmentation:
  enabled: true
  color_jitter:
    enabled: true
    brightness: 0.3  # [1-brightness, 1+brightness]
    contrast: 0.3
    saturation: 0.3
  random_gray:
    enabled: true
    p: 0.2
  random_rotation:
    enabled: true
    angle_range: [-5, 5]  # 度
    p: 0.3
  random_mask:
    enabled: true
    mask_ratio: 0.15  # mask区域占图像的比例
    p: 0.3
  horizontal_flip:
    enabled: false
    p: 0.5

# 随机Crop配置
crop:
  shrink_max: 3  # 最大内缩像素
  expand_max: 25  # 最大外扩像素

# COCO标注配置 (仅COCO格式使用)
coco:
  fall_category_id: 1  # 跌倒类别的category_id
  person_category_id: 1  # 人物类别的category_id

# Pascal VOC标注配置 (仅VOC格式使用，详见 simple_classifier_voc.yaml)
voc:
  # 数据目录 (支持多目录)
  # train_dirs:
  #   - "data/VOC2007"
  #   - "data/VOC2012"
  # val_dirs:
  #   - "data/VOC2007"

  # 类别映射
  fall_classes:  # 映射到 label=1 的类别
    - "fall"
    # - "fallen"
    # - "跌倒"
  normal_classes: null  # 映射到 label=0 的类别，null表示其他所有类别

# 缓存配置
cache:
  dir: "outputs/cache"  # VOC格式样本列表缓存目录
  image_cache_size: 1000  # LRU图像缓存大小（张），设为0禁用缓存

# 输出配置
output:
  dir: "outputs/simple_classifier"
  save_best: true
  save_every: 10  # 每N轮保存检查点 (仅无验证集时有效)

# torch.compile 配置 (PyTorch 2.0+)
compile:
  enabled: true  # 是否启用 torch.compile
  mode: "reduce-overhead"  # 编译模式: "default", "reduce-overhead", "max-autotune"

# DDP配置
ddp:
  backend: "nccl"
  find_unused_parameters: true

# 日志
log:
  epoch_log_interval: 1  # 每N轮打印epoch日志
  batch_log_interval: 50  # 每N个batch打印batch日志
  verbose: true

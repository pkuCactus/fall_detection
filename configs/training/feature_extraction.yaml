# 特征提取配置 (用于分类器训练)
# 使用: bash scripts/shell/run_extract_features.sh --video-dir data/videos

# 输入数据
video_dir: "data/videos"  # 视频目录
label_file: "data/labels.json"  # 跌倒事件标注文件

# 采样配置
sample_fps: 5  # 从视频中采样的FPS (原视频可能25/30fps)
max_frames_per_video: null  # 每视频最大采样帧数 (null=无限制)

# 时序窗口配置
history_seconds: 1.5  # 跟踪历史长度
motion_window_seconds: 0.5  # 运动特征窗口

# 预处理配置
roi_size: [96, 96]  # 分类器输入ROI尺寸
normalize: true  # 归一化到[0,1]

# 关键点过滤
min_visible_kpts: 8  # 最小可见关键点数 (低于此值的样本被丢弃)
min_bbox_size: 40  # 最小检测框尺寸 (像素)

# 数据增强 (提取时)
augmentation:
  enabled: true
  # 空间增强
  hflip_prob: 0.5  # 水平翻转 (跌倒应对称)
  # 时序增强
  temporal_jitter: 0.1  # 时间抖动 (±10%)

# 输出配置
output_dir: "train/cache"
format: "npz"  # 存储格式
compress: true  # 是否压缩

# 并行配置
num_workers: 4  # 并行处理视频数
